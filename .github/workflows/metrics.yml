name: Metrics

on:
  schedule:
    - cron: '30 0 * * 1'   # Monday 09:30 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Snapshot HF downloads
        run: python3 scripts/metrics.py hf

      - name: Rebuild downloads chart
        run: |
          pip install --quiet matplotlib
          python3 scripts/hf_chart.py

      - name: Commit
        run: |
          git config user.name "metrics-bot"
          git config user.email "metrics-bot@users.noreply.github.com"
          git add stats badge charts
          git diff --cached --quiet || { git commit -m "Metrics: weekly snapshot"; git push; }
